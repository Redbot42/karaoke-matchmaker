<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Karaoke Matchmaker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0e0e0f;--card:#18181a;--border:#2a2a2d;--text:#e8e6e1;--muted:#777;--accent:#1db954;--accent2:#158a3e}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column}
header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10;gap:12px}
.logo{font-size:1.05rem;font-weight:700;white-space:nowrap}.logo span{color:var(--accent)}
#loginBtn{background:var(--accent);color:#000;border:none;border-radius:999px;padding:9px 20px;font-weight:700;font-size:.85rem;cursor:pointer;white-space:nowrap;flex-shrink:0}
#loginBtn:disabled{background:var(--border);color:var(--muted);cursor:default}
.controls{padding:10px 16px;display:flex;gap:8px;border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.controls::-webkit-scrollbar{display:none}
.mode{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:999px;padding:7px 14px;font-size:.82rem;cursor:pointer;white-space:nowrap;flex-shrink:0}
.mode.on,.mode:hover{border-color:var(--accent);color:var(--accent)}
#q{min-width:140px;flex:1;background:var(--card);border:1px solid var(--border);border-radius:999px;padding:7px 15px;color:var(--text);font-size:.82rem;outline:none;display:none}
#q:focus{border-color:var(--accent)}
main{flex:1;padding:12px 16px;display:grid;gap:10px;align-content:start}
.song{background:var(--card);border:1px solid var(--border);border-radius:16px;display:flex;align-items:center;gap:12px;padding:10px 14px;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.art{width:56px;height:56px;border-radius:10px;object-fit:cover;flex-shrink:0;background:linear-gradient(135deg,var(--accent2),var(--accent))}
.art.fallback{display:flex;align-items:center;justify-content:center;font-size:1.4rem}
.info{flex:1;min-width:0}
.t{font-weight:600;font-size:.93rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.a{font-size:.8rem;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sp{font-size:.75rem;color:var(--muted);margin-top:3px}
.sc{font-size:.78rem;color:var(--accent);font-weight:700;flex-shrink:0;align-self:flex-start;padding-top:2px}
footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;justify-content:center;position:sticky;bottom:0;background:var(--bg)}
#shuf{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:999px;padding:11px 36px;font-size:.9rem;cursor:pointer;width:100%;max-width:320px}
#shuf:hover{border-color:var(--accent);color:var(--accent)}
.empty{color:var(--muted);text-align:center;padding:60px 0;font-size:.9rem;line-height:1.6}
@media(min-width:600px){
  header,footer,.controls,main{padding-left:24px;padding-right:24px}
  main{grid-template-columns:repeat(auto-fill,minmax(320px,1fr))}
  .art{width:64px;height:64px}
}
</style>
</head>
<body>
<header>
  <div class="logo">Karaoke<span>Match</span></div>
  <button id="loginBtn">Connect Spotify</button>
</header>
<div class="controls">
  <button class="mode on" data-m="top">Top Tracks</button>
  <button class="mode" data-m="recent">Recent</button>
  <button class="mode" data-m="taste">By Taste</button>
  <button class="mode" data-m="search">Search</button>
  <input id="q" placeholder="Artist or song…"/>
</div>
<main id="results"><div class="empty">Connect Spotify to find your karaoke matches.</div></main>
<footer><button id="shuf">Shuffle</button></footer>

<script>
const CLIENT_ID = 'cfc478599c144a4887b366ecf774362b';
// Auto-detects the current URL so it works on any host (GitHub Pages, local, etc.)
const REDIR = location.origin + location.pathname.replace(/\/$/, '');
const LIMIT = 5;

let token = null, karaoke = [], matches = [], mode = 'top';

fetch('karaoke.json').then(r=>r.json()).then(d=>{ karaoke = d; });

// ── Handle Spotify redirect back to this page ─────────────────────────────────
(async () => {
  const params = new URLSearchParams(location.search);
  const code = params.get('code');
  if (!code) return;
  history.replaceState({}, '', location.pathname);
  const verifier = sessionStorage.getItem('verifier');
  if (!verifier) return;
  const r = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ client_id:CLIENT_ID, grant_type:'authorization_code', code, redirect_uri:REDIR, code_verifier:verifier })
  });
  const d = await r.json();
  if (d.access_token) {
    token = d.access_token;
    const btn = document.getElementById('loginBtn');
    btn.textContent = 'Connected ✓'; btn.disabled = true;
    buildMatches();
  }
})();

// ── PKCE ──────────────────────────────────────────────────────────────────────
function genVer() {
  const a = new Uint8Array(32); crypto.getRandomValues(a);
  return btoa(String.fromCharCode(...a)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
async function chal(v) {
  const d = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(v));
  return btoa(String.fromCharCode(...new Uint8Array(d))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
async function login() {
  const v = genVer(); sessionStorage.setItem('verifier', v);
  const u = new URL('https://accounts.spotify.com/authorize');
  u.searchParams.set('client_id', CLIENT_ID);
  u.searchParams.set('response_type', 'code');
  u.searchParams.set('redirect_uri', REDIR);
  u.searchParams.set('code_challenge_method', 'S256');
  u.searchParams.set('code_challenge', await chal(v));
  u.searchParams.set('scope', 'user-top-read user-read-recently-played');
  location.href = u;
}

// ── Matching ──────────────────────────────────────────────────────────────────
const norm = s => (s||'').toLowerCase().normalize('NFKD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,' ').trim();
const tok  = s => new Set(norm(s).split(' ').filter(Boolean));
const over = (a,b) => { let n=0; a.forEach(v=>b.has(v)&&n++); return n; };

function matchTrack(t) {
  const artist = ((t.artists||[])[0]||{}).name||'';
  const tn = norm((t.name||'').replace(/\(.*?\)|\[.*?\]|-.*/g,''));
  const an = norm(artist);
  const ts = tok(tn), as = tok(an);
  let best = null;
  for (const k of karaoke) {
    const kt = norm(k.title.replace(/\(.*?\)|\[.*?\]|-.*/g,''));
    const ka = norm(k.artist);
    const sc = (kt===tn)*50 + (ka===an)*30 + over(ts,tok(kt))*8 + over(as,tok(ka))*6 + ((t.popularity||45)/3);
    if (sc >= 20 && (!best || sc > best.score))
      best = { spotify:t, karaoke:k, score:sc };
  }
  return best;
}

async function getTracks() {
  const h = { Authorization:'Bearer '+token };
  if (mode==='recent') {
    const r = await fetch('https://api.spotify.com/v1/me/player/recently-played?limit=40',{headers:h});
    return (await r.json()).items.map(x=>x.track).filter(Boolean);
  }
  if (mode==='search') {
    const q = document.getElementById('q').value.trim();
    if (!q) return [];
    const r = await fetch(`https://api.spotify.com/v1/search?type=track&limit=40&q=${encodeURIComponent(q)}`,{headers:h});
    return (await r.json()).tracks.items||[];
  }
  if (mode==='taste') {
    const ar = await fetch('https://api.spotify.com/v1/me/top/artists?limit=5&time_range=medium_term',{headers:h});
    const seeds = ((await ar.json()).items||[]).slice(0,5).map(a=>a.id).join(',');
    if (!seeds) return [];
    const r = await fetch(`https://api.spotify.com/v1/recommendations?seed_artists=${seeds}&limit=80`,{headers:h});
    return (await r.json()).tracks||[];
  }
  const r = await fetch('https://api.spotify.com/v1/me/top/tracks?limit=40&time_range=medium_term',{headers:h});
  return (await r.json()).items||[];
}

async function buildMatches() {
  document.getElementById('results').innerHTML='<div class="empty">Finding matches…</div>';
  try {
    const tracks = await getTracks();
    const raw = tracks.map(matchTrack).filter(Boolean).sort((a,b)=>b.score-a.score);
    const seen = new Map();
    for (const m of raw) { const k=norm(m.karaoke.artist+m.karaoke.title); if(!seen.has(k)) seen.set(k,m); }
    matches = [...seen.values()];
    render(matches.slice(0, LIMIT));
  } catch(e) {
    document.getElementById('results').innerHTML='<div class="empty">Error fetching tracks.</div>';
  }
}

const EM = ['🎤','🎶','🎵','🎸','🥁','🎹','🎺','🎷'];
function artEl(m, i) {
  const imgs = m.spotify.album && m.spotify.album.images;
  if (imgs && imgs.length) {
    const src = (imgs[1]||imgs[0]).url;
    return `<img class="art" src="${src}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\'art fallback\\'>${EM[i%EM.length]}</div>'"/>`;
  }
  return `<div class="art fallback">${EM[i%EM.length]}</div>`;
}
function render(list) {
  if (!list.length) { document.getElementById('results').innerHTML='<div class="empty">No matches found.<br>Try a different mode.</div>'; return; }
  document.getElementById('results').innerHTML = list.map((m,i) => `
    <div class="song">
      ${artEl(m,i)}
      <div class="info">
        <div class="t">${m.karaoke.title}</div>
        <div class="a">${m.karaoke.artist}</div>
        <div class="sp">via ${((m.spotify.artists||[])[0]||{}).name||''}</div>
      </div>
      <div class="sc">${Math.round(m.score)}</div>
    </div>`).join('');
}

document.getElementById('loginBtn').onclick = login;
document.getElementById('shuf').onclick = () => render([...matches].sort(()=>Math.random()-.5).slice(0, LIMIT));
document.querySelectorAll('.mode').forEach(b => b.onclick = () => {
  document.querySelectorAll('.mode').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); mode = b.dataset.m;
  document.getElementById('q').style.display = mode==='search'?'block':'none';
  if (token && mode!=='search') buildMatches();
});
document.getElementById('q').onchange = () => { if(token) buildMatches(); };
</script>
</body>
</html>
